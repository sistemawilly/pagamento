<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIX</title>

<style>

*{
  box-sizing: border-box;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #111, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:#d4af37;
  padding:15px;
}

.container{
  width:100%;
  max-width:380px;
  background:#0a0a0a;
  border:1px solid #d4af37;
  border-radius:15px;
  padding:20px;
  text-align:center;
  box-shadow:0 0 25px rgba(212,175,55,0.4);
}

h3{
  font-size:clamp(22px, 5vw, 28px);
  margin-bottom:15px;
  text-shadow:0 0 12px rgba(212,175,55,0.7);
}

.qr img{
  width:100%;
  max-width:220px;
  height:auto;
  border-radius:12px;
  padding:10px;
  background:#111;
  box-shadow:0 0 20px rgba(212,175,55,0.3);
  margin:10px auto 20px;
  display:block;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  text-align:center;
  background:#111;
  color:#d4af37;
  border:1px solid #d4af37;
  font-size:clamp(14px, 4vw, 18px);
  font-weight:bold;
  outline:none;
  margin-bottom:15px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg, #d4af37, #b8860b);
  color:#000;
  font-weight:bold;
  font-size:clamp(14px, 4vw, 18px);
  cursor:pointer;
  box-shadow:0 0 15px rgba(212,175,55,0.5);
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(212,175,55,0.8);
}

/* RESPONSIVO EXTRA */
@media (min-width:768px){
  .container{
    padding:30px;
    max-width:420px;
  }

  .qr img{
    max-width:250px;
  }
}

</style>
</head>

<body>

<div class="container">

<h3>Pagamento PIX</h3>

<div class="qr">
  <img src="pixx.JPG" alt="QR Code PIX">
</div>

<input type="text" id="pix" value="1af02d14-b1b1-4ad9-8416-bf19fbef98f1" readonly>

<button id="btnPix" onclick="copiarPix()">COPIAR CHAVE PIX</button>

</div>

<script>
function copiarPix(){
  let pix = document.getElementById("pix").value;
  let btn = document.getElementById("btnPix");

  navigator.clipboard.writeText(pix).then(() => {
    btn.innerText = "COPIADO ✔";

    setTimeout(() => {
      btn.innerText = "COPIAR CHAVE PIX";
    }, 2000);

  }).catch(() => {
    alert("Erro ao copiar PIX");
  });
}
</script>

</body>
</html>
