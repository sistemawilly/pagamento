<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIX</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #111, #000);
  color:#d4af37;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:380px;
  background:#0a0a0a;
  border:1px solid #d4af37;
  border-radius:15px;
  padding:25px;
  text-align:center;
  box-shadow:0 0 20px rgba(212,175,55,0.4);
}

h3{
  font-size:26px;
  margin-bottom:15px;
  text-shadow:0 0 12px rgba(212,175,55,0.7);
}

#qrcode{
  display:flex;
  justify-content:center;
  margin-bottom:15px;
  padding:12px;
  background:#111;
  border-radius:10px;
  box-shadow:0 0 15px rgba(212,175,55,0.3);
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  text-align:center;
  background:#111;
  color:#d4af37;
  border:1px solid #d4af37;
  outline:none;
  font-size:18px;
  font-weight:bold;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg, #d4af37, #b8860b);
  color:#000;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 15px rgba(212,175,55,0.5);
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(212,175,55,0.8);
}
</style>
</head>

<body>

<div class="container">

<div id="qrcode"></div>

<h3>Pagamento PIX</h3>

<input type="text" id="pix" value="00020126580014BR.GOV.BCB.PIX01361af02d14-b1b1-4ad9-8416-bf19fbef98f1520400005303986540510.005802BR5925JOAO WILLI FERNANDES PONC6008MILAGRES62070503***6304619D" readonly>

<button onclick="copiarPix()">COPIAR CHAVE PIX</button>

</div>

<script>
function copiarPix(){
  let pix = document.getElementById("pix");
  pix.select();
  pix.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("PIX copiado");
}

let pixValue = document.getElementById("pix").value;

new QRCode(document.getElementById("qrcode"), {
  text: pixValue,
  width: 210,
  height: 210
});
</script>

</body>
</html>
