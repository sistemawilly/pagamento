<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PIX</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle, #111, #000);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:#d4af37;
}

.container{
  width:90%;
  max-width:380px;
  background:#0a0a0a;
  border:1px solid #d4af37;
  border-radius:15px;
  padding:25px;
  text-align:center;
  box-shadow:0 0 25px rgba(212,175,55,0.4);
}

h3{
  font-size:28px;
  margin-bottom:15px;
  text-shadow:0 0 12px rgba(212,175,55,0.7);
}

/* QR CODE IMAGEM */
.qr img{
  width:220px;
  max-width:100%;
  border-radius:12px;
  padding:10px;
  background:#111;
  box-shadow:0 0 20px rgba(212,175,55,0.3);
  margin-bottom:15px;
}

input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  text-align:center;
  background:#111;
  color:#d4af37;
  border:1px solid #d4af37;
  font-size:18px;
  font-weight:bold;
  outline:none;
}

button{
  width:100%;
  margin-top:12px;
  padding:14px;
  border:none;
  border-radius:8px;
  background:linear-gradient(45deg, #d4af37, #b8860b);
  color:#000;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
  box-shadow:0 0 15px rgba(212,175,55,0.5);
  transition:0.3s;
}

button:hover{
  transform:scale(1.03);
  box-shadow:0 0 25px rgba(212,175,55,0.8);
}
</style>
</head>

<body>

<div class="container">
<h3>Pagamento PIX</h3>
<br>
<!-- QR CODE IMAGEM -->
<div class="qr">
  <img src="pixx.jpg" alt="QR Code PIX">
</div>
<br><br><br>

<input type="text" id="pix" value="1af02d14-b1b1-4ad9-8416-bf19fbef98f1" readonly>
<br><br>
<button onclick="copiarPix()">COPIAR CHAVE PIX</button>
<br><br>
</div>

<script>
function copiarPix(){
  let pix = document.getElementById("pix");
  pix.select();
  pix.setSelectionRange(0, 99999);
  document.execCommand("copy");
  alert("PIX copiado");
}
</script>

</body>
</html>
